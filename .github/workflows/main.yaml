name: Auto build sing-box config
on:
  schedule:
    - cron: "25,55 * * * *"
  workflow_dispatch:

permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install SubBridge
        run: npm install -g @0xsnx/subbridge

      - name: Fetch upstream proxies.yaml
        run: |
          curl -sL -o /tmp/proxies.yaml \
            "https://raw.githubusercontent.com/PuddinCat/BestClash/refs/heads/main/proxies.yaml"

      - name: Fetch extra free node sources
        run: |
          # Source 1: Ruk1ng001 (primary, ~109 nodes mixed protocols)
          curl -sL --connect-timeout 10 -o /tmp/extra1.yaml \
            "https://raw.githubusercontent.com/Ruk1ng001/freeSub/main/clash.yaml"
          # Source 2: ermaozi (fallback, ~20 stable nodes)
          curl -sL --connect-timeout 10 -o /tmp/extra2.yaml \
            "https://raw.githubusercontent.com/ermaozi/get_subscribe/main/subscribe/clash.yml"
          # Source 3: mfuu (fallback, ~27 nodes)
          curl -sL --connect-timeout 10 -o /tmp/extra3.yaml \
            "https://raw.githubusercontent.com/mfuu/v2ray/master/clash.yaml"

      - name: Build base sing-box config
        run: |
          INPUTS="-i /tmp/proxies.yaml"
          for src in extra1 extra2 extra3; do
            if [ -s "/tmp/$src.yaml" ]; then
              INPUTS="$INPUTS -i /tmp/$src.yaml"
              echo "➕ $src.yaml available"
            fi
          done
          subbridge build $INPUTS -o singbox-config.json

      - name: Enrich configs (cn + geo + pro versions)
        run: node scripts/enrich-singbox.js

      - name: Validate generated configs
        run: |
          for f in singbox-config*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" || exit 1
            echo "✅ $f valid"
          done

      - name: Commit and push
        run: |
          git add singbox-config*.json
          if git diff --cached --quiet; then
            echo "up to date — no changes"
          else
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git commit -m "Auto build sing-box configs: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
