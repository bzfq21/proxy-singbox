name: Auto build sing-box config
on:
  schedule:
    - cron: "25,55 * * * *"
  workflow_dispatch:

permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install SubBridge
        run: npm install -g @0xsnx/subbridge

      - name: Fetch upstream proxies.yaml
        run: |
          curl -sL -o /tmp/proxies.yaml \
            "https://raw.githubusercontent.com/PuddinCat/BestClash/refs/heads/main/proxies.yaml"

      - name: Build base sing-box config
        run: subbridge build -i /tmp/proxies.yaml -o singbox-config.json

      - name: Enrich configs (cn + geo versions)
        run: node scripts/enrich-singbox.js

      - name: Commit and push
        run: |
          git add singbox-config.json singbox-config-cn.json singbox-config-geo.json
          if git diff --cached --quiet; then
            echo "up to date — no changes"
          else
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git commit -m "Auto build sing-box configs: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
