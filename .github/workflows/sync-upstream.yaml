name: Sync upstream proxies

on:
  schedule:
    - cron: "20,50 * * * *"      # upstream bot runs at :10/:40, offset by 10 min
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Sync proxies.yaml from upstream
        env:
          UPSTREAM: https://github.com/PuddinCat/BestClash.git
        run: |
          git fetch "$UPSTREAM" main
          git checkout FETCH_HEAD -- proxies.yaml stars.svg
          if git diff --quiet; then
            echo "up to date"
          else
            git add proxies.yaml stars.svg
            git commit -m "Sync upstream proxies.yaml: $(date -u)"
            git push
          fi
